version: 2

models:
  - name: stg_ecommerce__orders
    description: "Table of 1 row per order"

    columns:
      - name: order_id
        description: ""
        tests:
          - not_null
          - unique

      - name: user_id
        description: ""

      - name: status
        description: "{{ doc('status') }}"
        tests:
          - not_null
          - accepted_values:
              values:
                - Processing
                - Cancelled
                - Shipped
                - Complete
                - Returned

      - name: gender
        description: ""
        tests:
          - accepted_values:
              values:
                - M
                - F

      - name: created_at
        description: ""

      - name: returned_at
        description: ""

      - name: shipped_at
        description: ""

      - name: delivered_at
        description: ""

      - name: num_of_item
        description: ""